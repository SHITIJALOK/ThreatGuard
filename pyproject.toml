[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
  ".venv",
  "docs",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_redundant_casts = true
warn_unused_ignores = true
check_untyped_defs = false
exclude = "(^docs/|^\\.venv/)"
files = [
  "threatguard/core/packet.py",
  "threatguard/core/flow_aggregator.py",
  "test_detection.py",
  "diagnostic_test.py",
  "evaluate_models_isolated.py",
  "tests",
]

[[tool.mypy.overrides]]
module = [
  "threatguard.core.flow_aggregator",
  "tests.test_flow_aggregator",
]
disable_error_code = ["attr-defined"]
